# Knowledge Frontmatter Schema

Matches docs/architecture/06-data-model.md (Knowledge Schema) and the Universal
Entity Schema. `owner` holds the UUID of the owning Project.

```yaml
id:            # UUID (required)
type: knowledge # Enum (required)
title:         # String (required)
owner:         # UUID of owning Project (required)
status:        # Enum: Draft | Active | Deprecated | Archived (required)
summary:       # String (optional)
content:       # String (optional)
resources:     # List<UUID> (optional)
tags:          # List<String> (optional)
created_at:    # DateTime UTC (required)
updated_at:    # DateTime UTC (required)
```
